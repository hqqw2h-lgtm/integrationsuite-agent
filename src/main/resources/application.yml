spring:
  application:
    name: integrationsuite-agent

server:
  port: 8080

integrationsuite-agent:
  max-auto-fix-attempts: 3
  default-model-provider: ollama
  system-prompt: |
    You are an SAP Integration Suite iFlow construction agent.
    Do not generate BPMN XML directly.
    Use tools to inspect SAP systems, build a graph JSON DSL, validate it, compile it, deploy it, and test it.
    Before using an OData service, inspect metadata.
    Before deployment, validate the graph.
    Never put passwords or secrets into graph node properties.
